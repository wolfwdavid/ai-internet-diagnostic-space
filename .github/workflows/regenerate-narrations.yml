name: Regenerate cached narrations

# D-NARRATOR-09: ANTHROPIC_API_KEY lives only as a GitHub Actions repository
# secret. This workflow is the only place the key is available -- local
# developers do not (and should not) have the key.
#
# Triggered manually from the GitHub UI:
#   Actions -> Regenerate cached narrations -> Run workflow
#
# Outcome: opens a PR with the regenerated cache JSONs (cache/narrations/).
# Reviewer reads the diff and merges if outputs look reasonable.

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: "Comma-separated scenario slugs to regenerate (default: all)"
        required: false
        default: "all"

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Regenerate narrations (Anthropic Haiku 4.5)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}    # D-NARRATOR-09
        run: |
          uv run python scripts/regenerate_cache.py \
            --scenarios "${{ github.event.inputs.scenarios }}"

      - name: Validate cached narrations (defense-in-depth)
        # Same gate ci.yml runs on every PR (D-NARRATOR-06). Catches
        # citation-validation regressions BEFORE the PR opens, so reviewers
        # never see a broken cache.
        run: uv run pytest tests/test_narrations_cache.py -x --tb=short

      - name: Open PR with regenerated cache
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/regenerate-narrations-${{ github.run_id }}
          title: "chore(cache): regenerate scenario narrations"
          commit-message: "chore(cache): regenerate scenario narrations via workflow_dispatch"
          body: |
            Auto-regenerated by `regenerate-narrations.yml` (run ${{ github.run_id }}).

            **Scenarios:** ${{ github.event.inputs.scenarios }}
            **Triggered by:** @${{ github.actor }}

            Review the diff under `cache/narrations/` and merge if outputs look
            reasonable. The validation gate already passed in CI on this branch
            (D-NARRATOR-06 + D-NARRATOR-12), so citations + top_class +
            EVIDENCE_RULES alignment are all enforced.
          add-paths: cache/narrations/
