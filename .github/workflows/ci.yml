name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # artifacts/*.joblib are LFS; joblib.load needs the real blobs

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install OpenMP runtime (macOS)
        # LightGBM's native lib_lightgbm.dylib links @rpath/libomp.dylib, which
        # macOS runners don't ship by default — without it joblib.load() of the
        # LightGBM model raises OSError at import. Linux/Windows bundle their own.
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy app.py

      - name: Unit tests
        run: uv run pytest -x --tb=short

      - name: Cache narration validation gate (D-NARRATOR-06)
        # Hard-fails the build if any cached narration's citations break,
        # if the cached top_class drifts from the live classifier (Pitfall E),
        # or if the cached headline exceeds D-VERDICT-06 max_length=140.
        # Fix: run `make cache-narrations` (Anthropic) or
        #      `make cache-narrations-templated` (offline) and commit the diff.
        run: uv run pytest tests/test_narrations_cache.py -x --tb=short
