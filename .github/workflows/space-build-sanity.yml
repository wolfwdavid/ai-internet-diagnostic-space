name: Space Build Sanity

# D-18: Locks the Python 3.13 + Gradio 6.13.x pin combo BEFORE any Space app
# code is written. Direct mitigation for PITFALLS.md Pitfall 7 (Python/Gradio
# pin drift recurrence).

on: [push, pull_request]

jobs:
  build-sanity:
    runs-on: ubuntu-latest  # match HF Space build runner OS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pinned requirements (mimics HF Space build)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Gradio at the version pinned in README frontmatter (6.13.x).
          # HF Space build resolves Gradio from `sdk_version` in README; we mirror
          # that here. Pin to <6.14 so the version assert below keeps mirroring the
          # README's sdk_version (6.13.0) instead of floating to the latest 6.x.
          pip install "gradio>=6.13,<6.14"

      - name: Verify Gradio version pin (Pitfall 7 mitigation)
        run: |
          python -c "import gradio; print(gradio.__version__); assert gradio.__version__.startswith('6.13'), f'Expected 6.13.x, got {gradio.__version__}'"

      - name: Verify app.py imports cleanly (dry import — no server launch)
        run: |
          python -c "import importlib.util; spec = importlib.util.spec_from_file_location('app', 'app.py'); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print('app.py imports cleanly')"

      - name: Gradio environment dump (CI diagnostic; surfaces version drift in CI logs)
        run: gradio environment
